<div class="layout">

  <aside class="sidebar">

    <h2 class="logo">

      Allocate

    </h2>


    <a
      *ngFor="let item of menuItems"
      [routerLink]="item.route"
      routerLinkActive="active">

      {{item.label}}

    </a>


    <div class="role-box">

      {{authService.user?.role}}

    </div>

  </aside>


  <div class="main">

    <header class="topbar">

      <div>

        {{authService.user?.name}}

      </div>


      <div>

        <select
          [value]="authService.user?.role"
          (change)="switchRole($any($event.target).value)">

          <option value="admin">
            Admin
          </option>

          <option value="tl">
            Team Lead
          </option>

          <option value="developer">
            Developer
          </option>

          <option value="tester">
            Tester
          </option>

        </select>


        <button
          (click)="logout()">

          Logout

        </button>

      </div>

    </header>



    <main>

      <router-outlet>
      </router-outlet>

    </main>


  </div>

</div>
