<div class="dashboard">

  <!-- HEADER -->
  <app-page-header [title]="'Delivery Overview'" [description]="'Real-time visibility across projects and resources.'">
  </app-page-header>

  <!-- STATS -->
  <div class="stats-grid">
    <app-stat-card label="Total Projects" [value]="totalProjects" icon="folder" accent="primary">
    </app-stat-card>

    <app-stat-card label="Active Projects" [value]="activeProjects" icon="trending_up" accent="primary">
    </app-stat-card>

    <app-stat-card label="Resource Utilization" [value]="avgUtil + '%'" icon="analytics" accent="warning">
    </app-stat-card>

    <app-stat-card label="Available Employees" [value]="available" icon="groups" accent="success">
    </app-stat-card>

  </div>




  <!-- CHART SECTION -->

  <div class="chart-grid">

    <!-- DONUT -->

    <div class="dashboard-card">

      <div class="card-header">

        <h3>Project Status</h3>

        <p>Distribution by current state</p>

      </div>

      <div class="chart-container">

        <canvas baseChart [data]="doughnutChartData" [options]="doughnutChartOptions" [type]="doughnutChartType">
        </canvas>

      </div>

    </div>

    <!-- BAR -->

    <div class="dashboard-card">

      <div class="card-header">

        <h3>Resource Utilization</h3>

        <p>Top 8 by current load</p>

      </div>

      <div class="bar-chart-container">

        <canvas baseChart [data]="barChartData" [options]="barChartOptions" [type]="barChartType">
        </canvas>

      </div>

    </div>

  </div>
  <!-- TABLE -->
  <div class="dashboard-card table-card">

    <div class="table-header">

      <h3>Overloaded Employees</h3>

      <span class="flagged">
        3 flagged
      </span>

    </div>

    <table class="custom-table">

      <thead>

        <tr>
          <th>Employee</th>
          <th>Role</th>
          <th>Utilization</th>
          <th>Availability</th>
          <th>Status</th>
        </tr>

      </thead>

      <tbody>

        <tr *ngFor="let e of overloaded">

          <td>{{e.name}}</td>

          <td>{{e.role}}</td>

          <td>

            <div class="progress-wrapper">

              <div class="progress-bar">
                <div class="progress-fill" [style.width.%]="e.utilization">
                </div>
              </div>

              <span>{{e.utilization}}%</span>

            </div>

          </td>

          <td>{{e.availability}}%</td>

          <td>
            <app-status-badge type="priority" value="high">
            </app-status-badge>
          </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>
