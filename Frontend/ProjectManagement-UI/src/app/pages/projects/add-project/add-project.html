<div class="modal-backdrop">

  <div class="create-modal">

    <!-- CLOSE -->
    <button class="close-btn" (click)="closeModal()">
      ✕
    </button>

    <!-- HEADER -->
    <h2>Create new project</h2>

    <p class="subtitle">
      Define scope first. You can allocate resources from the project details after creation.
    </p>

    <!-- PROJECT NAME -->
    <div class="form-group">

      <label>Project name</label>

      <input type="text" [(ngModel)]="name" placeholder="e.g. Atlas Payment Gateway">

    </div>

    <!-- DESCRIPTION -->
    <div class="form-group">

      <label>Description</label>

      <textarea rows="2" [(ngModel)]="description">
      </textarea>

    </div>

    <!-- ROW -->
    <div class="grid-3">

      <div class="form-group">

        <label>Estimated hours</label>

        <input type="number" [(ngModel)]="hours">

      </div>

      <div class="form-group">

        <label>Priority</label>

        <select>

          <option>Medium</option>
          <option>High</option>
          <option>Low</option>

        </select>

      </div>

      <div class="form-group">

        <label>Deadline</label>

        <input type="date">

      </div>

    </div>

    <!-- DEVELOPERS -->
    <div class="grid-2">

      <div class="form-group">

        <label>Required developers</label>

        <input type="number" value="2">

      </div>

      <div class="form-group">

        <label>Required testers</label>

        <input type="number" value="1">

      </div>

    </div>

    <!-- SKILLS -->
    <div class="form-group">

      <label>Required skills</label>

      <div class="skills">

        <span class="skill" *ngFor="let skill of Skills">

          {{ skill }}

        </span>

      </div>

    </div>

    <!-- BUTTON -->
    <div class="btn-row">

      <button class="create-btn" (click)="submit()">

        Create project

      </button>

    </div>

  </div>

</div>
