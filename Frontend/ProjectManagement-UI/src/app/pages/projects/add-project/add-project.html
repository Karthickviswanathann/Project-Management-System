<div class="modal">

    <h3>Create Project</h3>

    <input
      [(ngModel)]="name"
      placeholder="Project name">


    <textarea
      [(ngModel)]="description">
    </textarea>


    <input
      type="number"
      [(ngModel)]="hours">


    <button
      (click)="submit()">

      Save

    </button>

</div><p>add-project works!</p>
