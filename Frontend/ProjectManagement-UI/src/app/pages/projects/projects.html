<div class="header">

  <h2>Projects</h2>

  <button (click)="openCreate()">
      New Project
  </button>

</div>


<div class="project-grid">

  <div
      class="project-card"
      *ngFor="let project of projects"
      (click)="openDetails(project)">

      <h3>{{project.name}}</h3>

      <p>{{project.description}}</p>

      <p>
          Deadline:
          {{project.deadline}}
      </p>

      <p>
          Progress:
          {{project.progress}}%
      </p>

  </div>

</div>


<app-add-project
    *ngIf="createModal"
    (saveProject)="addProject($event)">
</app-add-project>


<app-project-details
    *ngIf="detailsModal"
    [project]="selectedProject">
</app-project-details>
