<div>

      <app-page-header
        title="QA Workspace"
        description="Bugs, test coverage, and review queue.">
      </app-page-header>



      <!-- stat cards -->

      <div class="stats-grid">

        <app-stat-card
          label="Open Bugs"
          [value]="totalBugs"
          icon="bug"
          accent="primary">
        </app-stat-card>


        <app-stat-card
          label="Pending"
          [value]="pending"
          icon="clock"
          accent="warning">
        </app-stat-card>


        <app-stat-card
          label="Passed"
          [value]="passed"
          icon="check-circle"
          accent="success">
        </app-stat-card>


        <app-stat-card
          label="Failed"
          [value]="failed"
          icon="x-circle"
          accent="destructive">
        </app-stat-card>

      </div>



      <div class="dashboard-grid">

        <!-- bug table -->

        <div class="card large-card">

          <table>

            <thead>

              <tr>

                <th>Bug</th>

                <th>Project</th>

                <th>Severity</th>

                <th>Status</th>

                <th>Assigned</th>

              </tr>

            </thead>


            <tbody>

              <tr *ngFor="let bug of bugs">

                <td>{{bug.title}}</td>

                <td>{{bug.projectName}}</td>

                <td>

                  <app-status-badge
                    type="priority"
                    [value]="bug.severity">
                  </app-status-badge>

                </td>

                <td>

                  <app-status-badge
                    type="test"
                    [value]="bug.status">
                  </app-status-badge>

                </td>

                <td>{{bug.assigneeName}}</td>

              </tr>

            </tbody>

          </table>

        </div>



        <!-- review tasks -->

        <div class="card">

          <div
            *ngFor="let task of testingTasks"
            class="task-card">

            <div class="task-header">

              <p>
                {{task.title}}
              </p>

              <app-status-badge
                type="priority"
                [value]="task.priority">
              </app-status-badge>

            </div>


            <p class="project-name">

              {{task.projectName}}

            </p>


            <div class="task-footer">

              <app-status-badge
                type="task"
                [value]="task.status">
              </app-status-badge>


              <span>

                Due {{task.displayDate}}

              </span>

            </div>

          </div>

        </div>

      </div>

    </div>
