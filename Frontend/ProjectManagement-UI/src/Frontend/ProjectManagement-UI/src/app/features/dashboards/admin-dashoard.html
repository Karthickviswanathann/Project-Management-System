<div>

  <app-page-header
    [title]="'Delivery Overview'"
    [description]="'Real-time visibility across projects and resources.'">
  </app-page-header>

  <div class="stats-grid">

    <app-stat-card
      label="Total Projects"
      [value]="totalProjects">
    </app-stat-card>

    <app-stat-card
      label="Active Projects"
      [value]="activeProjects">
    </app-stat-card>

    <app-stat-card
      label="Resource Utilization"
      [value]="avgUtil + '%'">
    </app-stat-card>

    <app-stat-card
      label="Available Employees"
      [value]="available">
    </app-stat-card>

  </div>


  <!-- Table -->

  <table>

    <thead>
      <tr>
        <th>Employee</th>
        <th>Role</th>
        <th>Utilization</th>
        <th>Availability</th>
        <th>Status</th>
      </tr>
    </thead>

    <tbody>

      <tr *ngFor="let e of overloaded">

        <td>{{e.name}}</td>

        <td>{{e.role}}</td>

        <td>{{e.utilization}}%</td>

        <td>{{e.availability}}%</td>

        <td>
          <app-status-badge
            value="high">
          </app-status-badge>
        </td>

      </tr>

    </tbody>

  </table>

</div>
