<div class="login-container">

    <div class="left-panel">

        <h1>Allocate</h1>

        <h2>
            Smart project allocation
        </h2>

    </div>


    <div class="right-panel">

        <h2>Welcome Back</h2>


        <div class="role-grid">

            <div
                *ngFor="let role of roles"
                class="role-card"
                [class.active]="selected==role.role"
                (click)="selectRole(role)">

                {{role.label}}

            </div>

        </div>


        <input
            type="email"
            [(ngModel)]="email">


        <input
            type="password"
            [(ngModel)]="password">


        <button
            (click)="login()">

            Sign In

        </button>

    </div>

</div>
